<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Predictor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-bold text-white mb-2">⚽ Prediction Dashboard</h1>
            <p class="text-slate-400">Live Premier League Fixtures & Machine Learning Predictions</p>
        </header>

        <div id="status-container" class="mb-8 text-center hidden">
            <div id="status-message" class="inline-block px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-sm">
                Fetching upcoming matches...
            </div>
        </div>

        <div id="matches-grid" class="space-y-6">
            <!-- Loading Skeleton -->
            <div class="animate-pulse space-y-4">
                <div class="h-32 bg-slate-800 rounded-xl"></div>
                <div class="h-32 bg-slate-800 rounded-xl"></div>
                <div class="h-32 bg-slate-800 rounded-xl"></div>
            </div>
        </div>
    </div>

    <script>
        async function fetchPredictions() {
            const grid = document.getElementById('matches-grid');
            const statusContainer = document.getElementById('status-container');
            const statusMsg = document.getElementById('status-message');

            try {
                const response = await fetch('/predict-upcoming');
                const data = await response.json();

                if (data.error) {
                    grid.innerHTML = `
                        <div class="bg-red-900/20 border border-red-500/50 p-6 rounded-xl text-center">
                            <p class="text-red-400 font-semibold">Error: ${data.error}</p>
                            <p class="text-sm text-red-300 mt-2">Make sure your FOOTBALL_API_KEY is set in the environment.</p>
                        </div>
                    `;
                    return;
                }

                if (!data.predictions || data.predictions.length === 0) {
                    grid.innerHTML = `
                        <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl text-center">
                            <p class="text-slate-400">No upcoming matches found.</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = '';
                data.predictions.forEach(p => {
                    if (p.error) {
                        grid.appendChild(createErrorCard(p));
                    } else {
                        grid.appendChild(createMatchCard(p));
                    }
                });

            } catch (err) {
                grid.innerHTML = `
                    <div class="bg-red-900/20 border border-red-500/50 p-6 rounded-xl text-center">
                        <p class="text-red-400 font-semibold">Failed to connect to API</p>
                        <p class="text-sm text-red-300 mt-2">Is the Flask server running?</p>
                    </div>
                `;
            }
        }

        function createMatchCard(p) {
            const date = new Date(p.utcDate).toLocaleString([], { 
                weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });
            const [home, away] = p.match.split(' vs ');
            const card = document.createElement('div');
            card.className = 'bg-slate-800 border border-slate-700 rounded-xl p-6 hover:border-indigo-500/50 transition-all shadow-xl';
            
            const probH = (p.probabilities.H * 100).toFixed(0);
            const probD = (p.probabilities.D * 100).toFixed(0);
            const probA = (p.probabilities.A * 100).toFixed(0);

            const predictionText = p.prediction === 'H' ? home : (p.prediction === 'A' ? away : 'Draw');
            const predictionColor = p.prediction === 'D' ? 'text-amber-400' : 'text-emerald-400';

            card.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="flex-1 text-center md:text-left">
                        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">${date}</p>
                        <div class="flex items-center justify-center md:justify-start gap-4">
                            <span class="text-xl font-bold text-white">${home}</span>
                            <span class="text-slate-500 font-medium italic">vs</span>
                            <span class="text-xl font-bold text-white">${away}</span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col items-center md:items-end gap-2">
                        <div class="px-4 py-1.5 rounded-full bg-slate-900 border border-slate-700 text-sm">
                            <span class="text-slate-400">Prediction:</span>
                            <span class="${predictionColor} font-bold ml-1">${predictionText}</span>
                        </div>
                        
                        <div class="flex gap-1 w-48 h-2 bg-slate-900 rounded-full overflow-hidden mt-2">
                            <div class="bg-emerald-500" style="width: ${probH}%" title="Home: ${probH}%"></div>
                            <div class="bg-amber-500" style="width: ${probD}%" title="Draw: ${probD}%"></div>
                            <div class="bg-rose-500" style="width: ${probA}%" title="Away: ${probA}%"></div>
                        </div>
                        <div class="flex justify-between w-48 text-[10px] text-slate-500 font-bold uppercase tracking-tighter">
                            <span>H ${probH}%</span>
                            <span>D ${probD}%</span>
                            <span>A ${probA}%</span>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        function createErrorCard(p) {
            const card = document.createElement('div');
            card.className = 'bg-slate-800/50 border border-slate-700 rounded-xl p-6 border-dashed';
            card.innerHTML = `
                <div class="flex justify-between items-center opacity-50">
                    <span class="font-medium text-slate-400">${p.match}</span>
                    <span class="text-xs bg-slate-700 px-2 py-1 rounded text-slate-300">Data Missing</span>
                </div>
            `;
            return card;
        }

        fetchPredictions();
    </script>
</body>
</html>
